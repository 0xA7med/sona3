name: CI

on:
  push:
    branches: [main]
    paths:
      - 'sona3-app/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'sona3-app/**'
      - '.github/workflows/ci.yml'

defaults:
  run:
    working-directory: sona3-app

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: sona3-app/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run build
